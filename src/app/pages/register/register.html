<app-topbar></app-topbar>
<app-auth-layout>
  <div class="register-form">

    <button class="btn-voltar" type="submit"> Voltar </button>

    <h2>Cadastro</h2>

    <form>
      <label>Email</label>
      <input type="email" placeholder="Digite seu email aqui">

      <label>Senha</label>
      <input type="password" placeholder="Digite sua senha aqui">

      <label>Confirme sua senha</label>
      <input type="password" placeholder="Confirme sua senha aqui">

      <button type="submit">ENVIAR</button>
    </form>

    <p class="login-link">
      Já possui uma conta? <a routerLink="/login">Login!</a>
    </p>
  </div>
</app-auth-layout>
